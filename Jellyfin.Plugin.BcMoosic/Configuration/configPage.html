<!DOCTYPE html>
<html>
<head>
  <title>bcMoosic</title>
</head>
<body>
  <div id="bcMoosicConfigPage" data-role="page" class="page library-page" data-require-admin="true">
    <div data-role="content">
      <div class="content-primary">
        <h2>bcMoosic</h2>
        <p style="margin:0.75em 0 1.5em;opacity:.75">
          Bandcamp music collection manager — browse purchases, wishlist, and followed artists,
          then download albums directly into your Jellyfin library.
        </p>
        <button is="emby-button" type="button" class="raised button-submit emby-button"
                onclick="window.location.href='/BcMoosic/'">
          Open bcMoosic
        </button>
        <p style="margin-top:1.5em;font-size:.82em;opacity:.55">
          Sign-in, music directory, and download format are configured inside the app.
          On mobile, use <strong>Add to Home Screen</strong> for a native-app shortcut.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
